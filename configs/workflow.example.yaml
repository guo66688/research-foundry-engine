workspace:
  notes_root: "/abs/path/to/notes"
  inbox_dir: "research/inbox"
  dossier_dir: "research/dossiers"
  assets_dir: "research/assets"

sources:
  arxiv:
    enabled: true
    role:
      - "fresh_discovery"
    default_window_days: 30
    preferred_buckets:
      - "must_read"
      - "trend_watch"
      - "gap_fill"
    categories:
      - "cs.AI"
      - "cs.LG"
      - "cs.CL"
    # 兼容旧字段：仍可使用 lookback_days。
    lookback_days: 30
    max_results: 120

  semantic_scholar:
    enabled: false
    role:
      - "trend_support"
      - "hot_backfill"
    default_window_days: 365
    preferred_buckets:
      - "trend_watch"
      - "gap_fill"
    restricted_buckets:
      - "must_read"
    api_key_env: "SEMANTIC_SCHOLAR_API_KEY"
    # 兼容旧字段：仍可使用 history_window_days。
    history_window_days: 365
    max_results: 40

# 来源感知分桶策略：先算基础分，再按来源角色路由到桶。
bucket_strategy:
  must_read:
    prefer_sources:
      - "arxiv"
    max_semantic_scholar_items: 0

  trend_watch:
    prefer_sources:
      - "arxiv"
      - "semantic_scholar"
    target_mix:
      arxiv: 0.5
      semantic_scholar: 0.5

  gap_fill:
    prefer_sources:
      - "arxiv"
      - "semantic_scholar"
    max_semantic_scholar_items: 2

  review_or_backfill:
    prefer_sources:
      - "local_inventory"
      - "canonical_map"

# 新版 triage 配置；代码仍兼容旧 triage_policy。
triage:
  scoring:
    weights:
      topical_fit: 0.28
      impact: 0.18
      recency: 0.12
      method_signal: 0.12
      knowledge_gain: 0.18
      bridge_value: 0.07
      actionability: 0.05
      redundancy_penalty: 0.10

  shortlist:
    total: 10
    must_read: 2
    trend_watch: 3
    gap_fill: 5

  deepread:
    must_read_top2: 2
    gap_fill_top1: 1

  diversity:
    max_per_bucket:
      inference: 3
      agent: 3
      alignment: 2
    min_per_bucket:
      evaluation: 1
      systems: 1

  inventory:
    # 默认扫描 strong knowledge；可开启 daily recommendations 作为弱信号。
    enable_daily_recommendations: true
    recent_window_days: 90

  feedback:
    enabled: true
    positive_events:
      - deepread
      - mark_useful
    negative_events:
      - mark_not_useful
      - ignored
      - archived

  queue:
    enabled: true
    max_active_items: 30
    max_daily_review_or_backfill: 2
    demote_after_ignored_runs: 3

  revisit:
    enabled: true
    max_daily_items: 2
    prefer_recently_referenced: true

  backfill:
    enabled: true
    canonical_map: "configs/canonical_map.yaml"
    max_daily_items: 2

  adaptation:
    enabled: true
    topic_weight_adjustment_cap: 0.15
    decay_factor: 0.9

# 旧版字段仍可用，便于平滑迁移。
triage_policy:
  shortlist_size: 10
  score_weights:
    topical_fit: 0.40
    freshness: 0.20
    impact: 0.25
    method_signal: 0.15

dossier_policy:
  figure_mode: "source-first"
  include_sections:
    - "snapshot"
    - "claims"
    - "evidence"
    - "questions"
  citation_style: "inline-links"
  summary_length: "medium"
  max_figures: 12

synthesis_policy:
  backlinking: true
  max_backlinks: 8
  relation_score_threshold: 0.2
  relation_types:
    - "extends"
    - "references"
    - "shares_topic"
    - "same_method_family"
  link_strategy: "keyword-first"
  relation_store: "runtime/artifacts/relations.json"

runtime:
  cache_dir: "runtime/cache"
  run_dir: "runtime/runs"
  artifact_dir: "runtime/artifacts"
  log_dir: "runtime/logs"
  log_level: "INFO"
  retry_limit: 3
  request_timeout_seconds: 20
  dedupe_strategy: "paper_id_then_title"
