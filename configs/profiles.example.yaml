profiles:
  - profile_id: "llm_systems"
    include_terms:
      - "large language model"
      - "alignment"
      - "inference"
      - "agent"
    exclude_terms:
      - "survey"
      - "workshop"
    priority: 5
    max_candidates: 50
    source_scope:
      - "arxiv"
    scoring_overrides:
      topical_fit: 0.35
      knowledge_gain: 0.22
    reading_preferences:
      prefer_depth_over_breadth: true
      tolerate_revisit: true
      prefer_systems_papers: true
    knowledge_map:
      model_systems:
        status: weak
        topics:
          - "inference serving"
          - "kv cache"
          - "batching"
          - "scheduling"
          - "speculative decoding"
      agent_systems:
        status: learning
        topics:
          - "planning"
          - "memory"
          - "tool use"
          - "verification"
          - "multi-agent"
      alignment:
        status: known
        topics:
          - "reward modeling"
          - "preference optimization"
          - "constitutional methods"
          - "evaluator design"
      evaluation:
        status: blind_spot
        topics:
          - "benchmark design"
          - "failure analysis"
          - "robustness"
          - "hallucination measurement"

  - profile_id: "multimodal_reasoning"
    include_terms:
      - "vision-language"
      - "multimodal"
      - "reasoning"
      - "video"
    exclude_terms:
      - "benchmark only"
      - "dataset release"
    priority: 4
    max_candidates: 40
    source_scope:
      - "arxiv"
    scoring_overrides:
      recency: 0.18
      method_signal: 0.18
    reading_preferences:
      prefer_depth_over_breadth: false
      tolerate_revisit: true
